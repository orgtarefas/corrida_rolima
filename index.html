<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rolimã Racer - Selecione seu Carro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <div class="car-card">
            <h1 class="car-name" id="carName">🔥 Carregando...</h1>
            
            <div class="car-stats" id="carStats">
                <div class="stat">⚡ Velocidade: <span id="velocidade">--</span>%</div>
                <div class="stat-bar"><div class="bar-fill" id="velBar" style="width: 0%"></div></div>
                <div class="stat">🎮 Controle: <span id="controle">--</span>%</div>
                <div class="stat-bar"><div class="bar-fill" id="ctrlBar" style="width: 0%"></div></div>
                <div class="stat">💪 Durabilidade: <span id="durabilidade">--</span>%</div>
                <div class="stat-bar"><div class="bar-fill" id="durBar" style="width: 0%"></div></div>
            </div>

            <div class="player-info">
                <span>⭐ Pontos: <strong id="playerPoints">0</strong></span>
                <span>🏆 Vitórias: <strong id="playerWins">0</strong></span>
            </div>

            <button id="selectCarBtn" class="btn-select">
                ✅ SELECIONAR CARRO
            </button>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Carregando modelo 3D...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
