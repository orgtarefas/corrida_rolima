<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rolimã Racer - Escolha seu Carrinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>🏎️ ROLIMÃ RACER</h1>
            <p>Escolha seu carrinho para a descida</p>
        </div>

        <div class="cars-container" id="carsContainer">
            <!-- Carro 1 - Fúria Vermelha -->
            <div class="car-card" data-car-id="carro1">
                <div class="car-preview">
                    <div class="carro1-visual">
                        <div class="car-body red"></div>
                        <div class="car-roof black"></div>
                        <div class="wheel wheel1"></div>
                        <div class="wheel wheel2"></div>
                        <div class="wheel wheel3"></div>
                        <div class="wheel wheel4"></div>
                    </div>
                </div>
                <h2 class="car-name">🔥 Fúria Vermelha</h2>
                <div class="car-stats">
                    <div class="stat">⚡ Velocidade: <span class="stat-value">85%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 85%"></div></div>
                    <div class="stat">🎮 Controle: <span class="stat-value">70%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 70%"></div></div>
                    <div class="stat">💪 Durabilidade: <span class="stat-value">65%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 65%"></div></div>
                    <div class="stat">🚀 Aceleração: <span class="stat-value">90%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 90%"></div></div>
                </div>
                <div class="car-price">💰 Grátis</div>
            </div>

            <!-- Carro 2 - Touro Azul -->
            <div class="car-card" data-car-id="carro2">
                <div class="car-preview">
                    <div class="carro2-visual">
                        <div class="car-body blue"></div>
                        <div class="car-bed gray"></div>
                        <div class="car-cabin lightblue"></div>
                        <div class="wheel wheel1"></div>
                        <div class="wheel wheel2"></div>
                        <div class="wheel wheel3"></div>
                        <div class="wheel wheel4"></div>
                    </div>
                </div>
                <h2 class="car-name">💪 Touro Azul</h2>
                <div class="car-stats">
                    <div class="stat">⚡ Velocidade: <span class="stat-value">60%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 60%"></div></div>
                    <div class="stat">🎮 Controle: <span class="stat-value">50%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 50%"></div></div>
                    <div class="stat">💪 Durabilidade: <span class="stat-value">95%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 95%"></div></div>
                    <div class="stat">🚀 Aceleração: <span class="stat-value">45%</span></div>
                    <div class="stat-bar"><div class="bar-fill" style="width: 45%"></div></div>
                </div>
                <div class="car-price">🔒 Desbloquear com vitórias</div>
            </div>
        </div>

        <div class="action-buttons">
            <button id="confirmBtn" class="btn-confirm" disabled>✅ CONFIRMAR CARRO</button>
        </div>

        <div id="selectedCarDisplay" class="selected-display"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
