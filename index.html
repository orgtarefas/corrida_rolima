<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rolimã Racer - Selecione seu Carro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="canvas-container"></div>

    <!-- UI agora no CANTO INFERIOR ESQUERDO -->
    <div class="ui-panel">
        <div class="car-info">
            <h2 id="carName">🔥 Carregando...</h2>
            
            <div class="stats">
                <div class="stat-item">
                    <span>⚡ Velocidade</span>
                    <span id="velocidade">--</span>
                    <div class="stat-bar"><div class="bar-fill" id="velBar"></div></div>
                </div>
                <div class="stat-item">
                    <span>🎮 Controle</span>
                    <span id="controle">--</span>
                    <div class="stat-bar"><div class="bar-fill" id="ctrlBar"></div></div>
                </div>
                <div class="stat-item">
                    <span>💪 Durabilidade</span>
                    <span id="durabilidade">--</span>
                    <div class="stat-bar"><div class="bar-fill" id="durBar"></div></div>
                </div>
            </div>

            <div class="player-stats">
                <span>⭐ <span id="playerPoints">0</span> pts</span>
                <span>🏆 <span id="playerWins">0</span> vitórias</span>
            </div>

            <button id="selectCarBtn" class="btn-select">
                ✅ SELECIONAR CARRO
            </button>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Carregando modelo 3D...</p>
    </div>

    <div id="toast"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
